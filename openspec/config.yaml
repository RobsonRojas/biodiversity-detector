version: "1.0.0"
metadata:
  name: "Patronos-Forest-Guardian"
  version: "v1-alpha"
  description: "Sistema de monitoramento acústico de baixo consumo para detecção de desmatamento."
  author: "ARPT - Amazon Rainforest Protection"

# Definição do MCU (ESP32-S3)
compute:
  architecture: "xtensa"
  platform: "esp-idf"
  soc: "ESP32-S3"
  cpu:
    clusters:
      - cores: 2
        type: "LX7"
        max_frequency_mhz: 240
  memory:
    internal_kb: 512
    psram_mb: 8

# Definição do Sensor de Áudio
sensors:
  - id: "i2s_mic_0"
    type: "audio"
    interface: "I2S"
    driver: "esp-idf-i2s"
    capabilities:
      sampling_rate_hz: 44100
      bit_depth: 32
      channels: 1
      buffer_strategy: "zero-copy-ring-buffer"

# Restrições de Energia (Otimizado para ESP32-S3)
power_constraints:
  max_power_mw: 250
  sleep_modes:
    - mode: "deep_sleep"
      consumption_uw: 10
      wake_up_time_ms: 500
    - mode: "light_sleep"
      consumption_uw: 800
      wake_up_time_ms: 1

# Requisitos para o Modelo de IA (Edge Inference)
ai_requirements:
  framework: "tflite_micro"
  precision: "int8"
  input_shape: [1, 88200, 1] # 2 segundos @ 44.1kHz
  target_latency_ms: 100
  min_confidence: 0.80

# Interface de Saída (LoRa Mesh)
telemetry:
  protocol: "lora_mesh"
  region: "AU915"
  mesh_support: true
  payload_format: "json_compact"