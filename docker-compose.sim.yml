version: '3.8'

services:
  node5_gateway:
    build:
      context: .
      dockerfile: Dockerfile.sim
    container_name: node5
    environment:
      - NODE_ID=0x0005
      - NODE_ROLE=Gateway
      - SIM_LAT=-3.0016
      - SIM_LON=-59.9405
      - SIM_DISABLE_SLEEP=1
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
    networks:
      - mesh_net

  node4_router:
    build:
      context: .
      dockerfile: Dockerfile.sim
    container_name: node4
    environment:
      - NODE_ID=0x0004
      - NODE_ROLE=Router
      - SIM_LAT=-3.0036
      - SIM_LON=-59.9425
      - SIM_DISABLE_SLEEP=1
      - SIM_LORA_NEIGHBORS=node3,node5
      - MESH_ROUTES=0x0005:0x0005
    networks:
      - mesh_net

  node3_router:
    build:
      context: .
      dockerfile: Dockerfile.sim
    container_name: node3
    environment:
      - NODE_ID=0x0003
      - NODE_ROLE=Router
      - SIM_LAT=-3.0056
      - SIM_LON=-59.9445
      - SIM_DISABLE_SLEEP=1
      - SIM_LORA_NEIGHBORS=node2,node4
      - MESH_ROUTES=0x0005:0x0004
    networks:
      - mesh_net

  node2_router:
    build:
      context: .
      dockerfile: Dockerfile.sim
    container_name: node2
    environment:
      - NODE_ID=0x0002
      - NODE_ROLE=Router
      - SIM_LAT=-3.0076
      - SIM_LON=-59.9465
      - SIM_DISABLE_SLEEP=1
      - SIM_LORA_NEIGHBORS=node1,node3
      - MESH_ROUTES=0x0005:0x0003
    networks:
      - mesh_net

  node1_leaf:
    build:
      context: .
      dockerfile: Dockerfile.sim
    container_name: node1
    environment:
      - NODE_ID=0x0001
      - NODE_ROLE=Leaf
      - SIM_LAT=-3.0096
      - SIM_LON=-59.9485
      - BACKEND=qemu
      - SIM_DISABLE_SLEEP=1
      - SIM_LORA_NEIGHBORS=node2
      - MESH_ROUTES=0x0005:0x0002
      - SIM_DETECTION_TRIGGER=/tmp/0x0001_chainsaw_trigger
    networks:
      - mesh_net
    command: ["python3", "scripts/qemu_runner.py"]

networks:
  mesh_net:
    driver: bridge
